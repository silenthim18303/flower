<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>花期乘风录 - 送给明星</title>
    <link rel="icon" href="img/金花/2.png" type="image/png">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            background: #090d14 url('img/背景/加载背景.png') center center / cover no-repeat fixed;
            min-height: 100vh;
        }

        body {
            min-height: 100vh;
            font-family: "Microsoft YaHei", sans-serif;
            color: #fff;
        }

        .page {
            width: 100%;
            margin: 0 auto;
            padding: 14px 12px 24px;
            box-sizing: border-box;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 10px 12px;
            margin-bottom: 14px;
            border-radius: 14px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .back-btn {
            flex-shrink: 0;
            height: 34px;
            padding: 0 12px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

        .back-btn:active {
            transform: scale(0.96);
        }

        .title {
            font-size: clamp(15px, 3vw, 18px);
            font-weight: 700;
            color: #fff;
        }

        .golden-badge {
            flex-shrink: 0;
            height: 34px;
            padding: 0 14px;
            border-radius: 999px;
            background: linear-gradient(135deg, #f5a623, #f7c948);
            color: #5a3e00;
            font-size: 14px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            width: 100%;
        }

        .star-card {
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 16px;
            padding: 14px 8px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: background 200ms ease;
        }

        .star-card:hover {
            background: #f5f5f5;
        }

        .star-avatar {
            width: min(64px, 100%);
            height: min(64px, 100%);
            max-width: 64px;
            max-height: 64px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #e0e0e0;
            background: #f5f5f5;
        }

        .star-name {
            font-size: 13px;
            font-weight: 700;
            color: #222;
            text-align: center;
            line-height: 1.2;
        }

        .star-received {
            font-size: 11px;
            color: #888;
            text-align: center;
        }

        .qty-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .qty-btn {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 8px;
            background: #eee;
            color: #333;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 120ms ease;
            line-height: 1;
        }

        .qty-btn:hover {
            background: #ddd;
        }

        .qty-btn:active {
            transform: scale(0.92);
        }

        .qty-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .qty-value {
            min-width: 28px;
            text-align: center;
            font-size: 15px;
            font-weight: 700;
            color: #222;
        }

        .donate-btn {
            width: 100%;
            height: 30px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #f5a623, #e89b1d);
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 120ms ease, transform 120ms ease;
        }

        .donate-btn:hover {
            opacity: 0.9;
        }

        .donate-btn:active {
            transform: scale(0.97);
        }

        .donate-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .footer {
            margin-top: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .tip {
            min-height: 20px;
            font-size: 13px;
            color: #f7c948;
            text-align: center;
        }

        .tip.error {
            color: #ff6b6b;
        }

        @media (max-width: 480px) {
            .page {
                padding: 10px 8px 20px;
            }

            .header {
                padding: 8px 10px;
                gap: 8px;
            }

            .back-btn {
                height: 30px;
                padding: 0 10px;
                font-size: 12px;
            }

            .title {
                font-size: 14px;
            }

            .golden-badge {
                height: 30px;
                padding: 0 10px;
                font-size: 12px;
            }

            .grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 6px;
            }

            .star-card {
                padding: 8px 4px 8px;
                gap: 4px;
                border-radius: 12px;
            }

            .star-avatar {
                width: 44px;
                height: 44px;
                border-width: 2px;
            }

            .star-name {
                font-size: 11px;
            }

            .star-received {
                font-size: 10px;
            }

            .qty-row {
                gap: 4px;
            }

            .qty-btn {
                width: 22px;
                height: 22px;
                font-size: 12px;
                border-radius: 6px;
            }

            .qty-value {
                font-size: 12px;
                min-width: 20px;
            }

            .donate-btn {
                height: 24px;
                font-size: 10px;
                border-radius: 6px;
            }

            .footer {
                margin-top: 12px;
            }

            .tip {
                font-size: 12px;
            }
        }
    </style>
    <script src="js/config.js"></script>
    <script src="js/state.js"></script>
</head>
<body>
    <div class="page">
        <div class="header">
            <div class="header-left">
                <button class="back-btn" type="button" id="save-back-btn">返回花园</button>
                <div class="title">送给明星</div>
            </div>
            <div class="golden-badge">金花：<span id="golden-count">0</span></div>
        </div>

        <div class="grid" id="star-grid"></div>

        <div class="footer">
            <p class="tip" id="donate-tip"></p>
        </div>
    </div>

    <script>
        (function() {
            var DONATE_RECORD_KEY = 'flower_donate_records_v1';
            var stars = [
                '乌兰图雅', '侯宇', '叶一茜', '唐艺昕', '安崎',
                '庄法', '徐梦洁', '徐洁儿', '曾沛慈', '李小冉',
                '李心洁', '江语晨', '温峥嵘', '王濛', '范玮琪',
                '萧蔷', '谢楠', '赵子琪', '阚清子', '陶昕然'
            ];

            var state = window.FlowerState;
            var stateService = window.FlowerStateService;
            var goldenCountEl = document.getElementById('golden-count');
            var gridEl = document.getElementById('star-grid');
            var tipEl = document.getElementById('donate-tip');
            var saveBackBtn = document.getElementById('save-back-btn');
            var donateRecords = loadDonateRecords();
            var qtyMap = {};

            for (var i = 0; i < stars.length; i++) {
                qtyMap[stars[i]] = 1;
            }

            if (stateService && typeof stateService.loadProgress === 'function') {
                stateService.loadProgress();
            }

            renderStars();
            refreshUI();

            if (saveBackBtn) {
                saveBackBtn.addEventListener('click', function() {
                    saveProgress();
                    window.location.href = 'index.html';
                });
            }

            function loadDonateRecords() {
                try {
                    var raw = localStorage.getItem(DONATE_RECORD_KEY);
                    if (!raw) {
                        return {};
                    }
                    var parsed = JSON.parse(raw);
                    return parsed && typeof parsed === 'object' ? parsed : {};
                } catch (e) {
                    return {};
                }
            }

            function saveDonateRecords() {
                try {
                    localStorage.setItem(DONATE_RECORD_KEY, JSON.stringify(donateRecords));
                } catch (e) {
                }
            }

            function getGoldenCount() {
                if (!state || !state.warehouse) {
                    return 0;
                }
                var value = parseInt(state.warehouse.golden, 10);
                return isNaN(value) ? 0 : Math.max(value, 0);
            }

            function saveProgress() {
                if (stateService && typeof stateService.saveProgress === 'function') {
                    stateService.saveProgress();
                }
            }

            function setTip(text, isError) {
                if (!tipEl) {
                    return;
                }
                tipEl.textContent = text || '';
                tipEl.className = isError ? 'tip error' : 'tip';
            }

            function donateTo(starName) {
                var qty = qtyMap[starName] || 1;
                var goldenCount = getGoldenCount();

                if (qty <= 0) {
                    setTip('请选择赠送数量。', true);
                    return;
                }

                if (goldenCount < qty) {
                    setTip('金花不足，当前仅有 ' + goldenCount + ' 朵。', true);
                    return;
                }

                state.warehouse.golden = goldenCount - qty;
                donateRecords[starName] = (donateRecords[starName] || 0) + qty;
                saveDonateRecords();
                saveProgress();
                setTip('已向 ' + starName + ' 赠送 ' + qty + ' 朵金花！', false);
                qtyMap[starName] = 1;
                refreshUI();
                renderStars();
            }

            function changeQty(starName, delta) {
                var goldenCount = getGoldenCount();
                var current = qtyMap[starName] || 1;
                var next = current + delta;
                if (next < 1) {
                    next = 1;
                }
                if (next > goldenCount) {
                    next = goldenCount;
                }
                qtyMap[starName] = next;

                var qtyEl = gridEl.querySelector('[data-qty="' + starName + '"]');
                if (qtyEl) {
                    qtyEl.textContent = next;
                }

                var minusBtn = gridEl.querySelector('[data-minus="' + starName + '"]');
                if (minusBtn) {
                    minusBtn.disabled = next <= 1;
                }

                var plusBtn = gridEl.querySelector('[data-plus="' + starName + '"]');
                if (plusBtn) {
                    plusBtn.disabled = next >= goldenCount;
                }
            }

            function renderStars() {
                if (!gridEl) {
                    return;
                }

                var goldenCount = getGoldenCount();
                var html = [];
                for (var i = 0; i < stars.length; i++) {
                    var starName = stars[i];
                    var donated = donateRecords[starName] || 0;
                    var qty = qtyMap[starName] || 1;
                    html.push(
                        '<div class="star-card" data-star="' + starName + '">' +
                        '  <img class="star-avatar" src="img/人物形象/' + starName + '.png" alt="' + starName + '">' +
                        '  <div class="star-name">' + starName + '</div>' +
                        '  <div class="star-received" data-star-count="' + starName + '">已收 ' + donated + '</div>' +
                        '  <div class="qty-row">' +
                        '    <button class="qty-btn" type="button" data-action="minus" data-minus="' + starName + '"' + (qty <= 1 ? ' disabled' : '') + '>−</button>' +
                        '    <span class="qty-value" data-qty="' + starName + '">' + qty + '</span>' +
                        '    <button class="qty-btn" type="button" data-action="plus" data-plus="' + starName + '"' + (qty >= goldenCount ? ' disabled' : '') + '>+</button>' +
                        '  </div>' +
                        '  <button class="donate-btn" type="button" data-action="donate" data-star="' + starName + '"' + (goldenCount <= 0 ? ' disabled' : '') + '>赠送</button>' +
                        '</div>'
                    );
                }
                gridEl.innerHTML = html.join('');
            }

            function refreshUI() {
                var goldenCount = getGoldenCount();
                if (goldenCountEl) {
                    goldenCountEl.textContent = goldenCount;
                }

                if (!gridEl) {
                    return;
                }

                var countEls = gridEl.querySelectorAll('[data-star-count]');
                for (var i = 0; i < countEls.length; i++) {
                    var countEl = countEls[i];
                    var starName = countEl.getAttribute('data-star-count');
                    var donated = donateRecords[starName] || 0;
                    countEl.textContent = '已收 ' + donated;
                }

                var donateBtns = gridEl.querySelectorAll('[data-action="donate"]');
                for (var j = 0; j < donateBtns.length; j++) {
                    donateBtns[j].disabled = goldenCount <= 0;
                }

                var plusBtns = gridEl.querySelectorAll('[data-action="plus"]');
                for (var k = 0; k < plusBtns.length; k++) {
                    var plusBtn = plusBtns[k];
                    var star = plusBtn.getAttribute('data-plus');
                    plusBtn.disabled = (qtyMap[star] || 1) >= goldenCount;
                }
            }

            document.addEventListener('click', function(e) {
                var target = e.target;
                if (!target) {
                    return;
                }

                var action = target.getAttribute('data-action');

                if (action === 'minus') {
                    var starName = target.getAttribute('data-minus');
                    if (starName) {
                        changeQty(starName, -1);
                    }
                    return;
                }

                if (action === 'plus') {
                    var starName = target.getAttribute('data-plus');
                    if (starName) {
                        changeQty(starName, 1);
                    }
                    return;
                }

                if (action === 'donate') {
                    var starName = target.getAttribute('data-star');
                    if (starName) {
                        donateTo(starName);
                    }
                    return;
                }
            });
        })();
    </script>
</body>
</html>
