<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>去打赏</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #eef5ff 0%, #f8fbff 100%);
            font-family: "Microsoft YaHei", sans-serif;
            color: #2c3f5f;
        }

        .card {
            width: min(360px, calc(100vw - 32px));
            border-radius: 16px;
            background: #fff;
            border: 1px solid #dbe5f5;
            box-shadow: 0 14px 28px rgba(9, 20, 40, 0.15);
            padding: 20px 18px;
            box-sizing: border-box;
            text-align: center;
        }

        .title {
            margin: 0;
            font-size: 22px;
            font-weight: 700;
            color: #244269;
        }

        .desc {
            margin: 10px 0 0;
            font-size: 14px;
            line-height: 1.6;
            color: #556d92;
        }

        .back {
            margin-top: 16px;
            border: none;
            border-radius: 10px;
            height: 38px;
            width: 100%;
            background: #2b78d6;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1 class="title">请选择你喜欢的明星进行送花打赏</h1>
        <p class="desc">正在开发中...</p>
        <button class="back" type="button" onclick="window.location.href='index.html'">返回游戏</button>
    </div>
</body>
</html>
