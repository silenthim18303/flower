<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>种花小游戏</title>
    <script>
        (function() {
            try {
                // 检查是否已完成新手引导
                const guideCompleted = localStorage.getItem('flower_guide_completed') === 'true';
                if (!guideCompleted) {
                    // 未完成引导，跳转到引导页面
                    window.location.href = 'guide.html';
                    return;
                }
                
                if (window.sessionStorage && sessionStorage.getItem('flower_boot_loaded') === '1') {
                    document.documentElement.classList.add('skip-boot-loading');
                }
            } catch (e) {
                console.error('引导检查失败:', e);
            }
        })();
    </script>
    <link rel="stylesheet" href="css/game.css" />
    <script src="phaser3.min.js"></script>
</head>
<body>
    <div id="boot-loading" aria-live="polite">
        <div class="boot-loading-panel">
            <div class="boot-loading-title">正在进入花园...</div>
            <div class="boot-loading-progress-track">
                <div id="boot-loading-progress-fill" class="boot-loading-progress-fill"></div>
            </div>
            <div id="boot-loading-progress-text" class="boot-loading-progress-text">0%</div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/state.js"></script>
    <script src="js/ui-modal.js"></script>
    <script src="js/ui-level.js"></script>
    <script src="js/ui-warehouse.js"></script>
    <script src="js/ui-toolbar.js"></script>
    <script src="js/ui-collect.js"></script>
    <script src="js/ui-daily.js"></script>
    <script src="js/ui-exchange.js"></script>
    <script src="js/ui-help.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/flower-pot.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
